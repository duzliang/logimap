<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Table · LogiMap</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { margin: 0; padding: 12px; background: var(--color-bg); font-family: var(--font-body); color: var(--color-text-primary); font-size: var(--font-size-body); }
  .row { display: flex; align-items: center; gap: 8px; margin-bottom: 8px; flex-wrap: wrap; }
  .row > .label { width: 92px; flex-shrink: 0; font-size: var(--font-size-caption); color: var(--color-text-secondary); white-space: nowrap; }
  .row.table-row { display: block; }
  .row.table-row > .label { display: block; width: auto; margin-bottom: 6px; }
  .divider { border: none; border-top: 1px solid var(--color-border); margin: 12px 0; }
  /* @component-css-start */
  .lm-table { width: 100%; border-collapse: separate; border-spacing: 0; border: 1px solid var(--color-border); border-radius: var(--radius-lg); overflow: hidden; font-size: var(--font-size-body); }
  .lm-table thead th { background: var(--color-muted); color: var(--color-text-secondary); font-weight: var(--font-weight-caption); font-size: var(--font-size-caption); text-align: left; padding: var(--space-3) var(--space-4); white-space: nowrap; border-bottom: 1px solid var(--color-border); }
  .lm-table tbody td { background: var(--color-surface); padding: var(--space-3) var(--space-4); color: var(--color-text-primary); border-bottom: 1px solid var(--color-border); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; max-width: 220px; }
  .lm-table tbody tr:last-child td { border-bottom: none; }
  .lm-table tbody tr:hover td { background: var(--color-muted); }
  .lm-table tbody tr.is-selected td { background: var(--logimap-primary-50); }
  .lm-cell-name { font-weight: var(--font-weight-h4); color: var(--color-text-primary); }
  .lm-cell-meta { color: var(--color-text-secondary); font-size: var(--font-size-caption); }
  .lm-pri { font-size: var(--font-size-caption); color: var(--color-text-secondary); }
  .lm-pri.is-high { color: var(--color-error); font-weight: var(--font-weight-caption); }
  .lm-pri.is-mid { color: var(--color-warning); font-weight: var(--font-weight-caption); }
  .lm-badge { display: inline-flex; align-items: center; gap: 4px; padding: 2px 8px; border-radius: var(--radius-full); font-size: var(--font-size-caption); font-weight: var(--font-weight-caption); line-height: 1.4; white-space: nowrap; }
  .lm-badge::before { content: ""; width: 6px; height: 6px; border-radius: var(--radius-full); flex-shrink: 0; }
  .lm-badge.is-neutral { background: var(--logimap-neutral-100); color: var(--color-text-secondary); }
  .lm-badge.is-neutral::before { background: var(--logimap-neutral-400); }
  .lm-badge.is-success { background: var(--logimap-success-50); color: var(--logimap-success-700); }
  .lm-badge.is-success::before { background: var(--color-success); }
  .lm-badge.is-warning { background: var(--logimap-warning-50); color: var(--logimap-warning-700); }
  .lm-badge.is-warning::before { background: var(--color-warning); }
  .lm-badge.is-error { background: var(--logimap-error-50); color: var(--logimap-error-700); }
  .lm-badge.is-error::before { background: var(--color-error); }
  .lm-owner { display: inline-flex; align-items: center; gap: 6px; color: var(--color-text-primary); }
  .lm-avatar { width: 20px; height: 20px; border-radius: var(--radius-full); background: var(--logimap-primary-100); color: var(--logimap-primary-700); font-size: 10px; font-weight: var(--font-weight-caption); display: inline-flex; align-items: center; justify-content: center; flex-shrink: 0; }
  /* @component-css-end */
</style>
</head>
<body>
  <svg style="display:none" xmlns="http://www.w3.org/2000/svg">
    <symbol id="i-check" viewBox="0 0 24 24"><path d="M20 6L9 17l-5-5" stroke="currentColor" stroke-width="2.4" fill="none" stroke-linecap="round" stroke-linejoin="round"/></symbol>
  </svg>
  <div class="row table-row" data-evidence-sample="default-node-list">
    <span class="label">节点列表</span>
    <table class="lm-table">
      <thead>
        <tr>
          <th>节点名称</th><th>状态</th><th>优先级</th><th>负责人</th><th>更新时间</th>
        </tr>
      </thead>
      <tbody>
        <tr data-evidence-sample="row-confirmed">
          <td class="lm-cell-name">订单结算</td>
          <td><span class="lm-badge is-success"><svg width="10" height="10"><use href="#i-check"/></svg>已确认</span></td>
          <td><span class="lm-pri is-high">高</span></td>
          <td><span class="lm-owner"><span class="lm-avatar">林</span>林晓</span></td>
          <td class="lm-cell-meta">2026-07-08 14:32</td>
        </tr>
        <tr data-evidence-sample="row-pending">
          <td class="lm-cell-name">退款申请</td>
          <td><span class="lm-badge is-warning">待审</span></td>
          <td><span class="lm-pri is-mid">中</span></td>
          <td><span class="lm-owner"><span class="lm-avatar">陈</span>陈昊</span></td>
          <td class="lm-cell-meta">2026-07-08 11:05</td>
        </tr>
        <tr class="is-selected" data-evidence-sample="row-draft-selected">
          <td class="lm-cell-name">优惠券计算</td>
          <td><span class="lm-badge is-neutral">草稿</span></td>
          <td><span class="lm-pri">低</span></td>
          <td><span class="lm-owner"><span class="lm-avatar">王</span>王芮</span></td>
          <td class="lm-cell-meta">2026-07-07 18:47</td>
        </tr>
      </tbody>
    </table>
  </div>
  <hr class="divider">
  <div class="row table-row" data-evidence-sample="status-badge-strip">
    <span class="label">状态徽标</span>
    <table class="lm-table">
      <thead>
        <tr><th>节点名称</th><th>状态</th><th>优先级</th><th>负责人</th><th>更新时间</th></tr>
      </thead>
      <tbody>
        <tr data-evidence-sample="badge-confirmed">
          <td class="lm-cell-name">订单结算</td>
          <td><span class="lm-badge is-success"><svg width="10" height="10"><use href="#i-check"/></svg>已确认</span></td>
          <td><span class="lm-pri is-high">高</span></td>
          <td><span class="lm-owner"><span class="lm-avatar">林</span>林晓</span></td>
          <td class="lm-cell-meta">2026-07-08 14:32</td>
        </tr>
        <tr data-evidence-sample="badge-pending">
          <td class="lm-cell-name">退款申请</td>
          <td><span class="lm-badge is-warning">待审</span></td>
          <td><span class="lm-pri is-mid">中</span></td>
          <td><span class="lm-owner"><span class="lm-avatar">陈</span>陈昊</span></td>
          <td class="lm-cell-meta">2026-07-08 11:05</td>
        </tr>
        <tr data-evidence-sample="badge-draft">
          <td class="lm-cell-name">优惠券计算</td>
          <td><span class="lm-badge is-neutral">草稿</span></td>
          <td><span class="lm-pri">低</span></td>
          <td><span class="lm-owner"><span class="lm-avatar">王</span>王芮</span></td>
          <td class="lm-cell-meta">2026-07-07 18:47</td>
        </tr>
      </tbody>
    </table>
  </div>
</body>
</html>
