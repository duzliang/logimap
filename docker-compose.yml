services:
  # PostgreSQL Database
  db:
    image: postgres:16-alpine
    container_name: logimap-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${DB_PASSWORD:-logimap_secret}
      POSTGRES_DB: logimap
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Backend API
  api:
    build:
      context: .
      dockerfile: Dockerfile.api
    container_name: logimap-api
    restart: unless-stopped
    environment:
      NODE_ENV: production
      DATABASE_URL: postgresql://postgres:${DB_PASSWORD:-logimap_secret}@db:5432/logimap
      JWT_SECRET: ${JWT_SECRET:-your-production-jwt-secret-change-me}
      PORT: 3001
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "3001:3001"
    command: >
      sh -c "
        npx prisma migrate deploy &&
        node dist/index.js
      "

  # Frontend Web
  web:
    build:
      context: .
      dockerfile: Dockerfile.web
    container_name: logimap-web
    restart: unless-stopped
    ports:
      - "80:80"
    depends_on:
      - api

volumes:
  postgres_data: